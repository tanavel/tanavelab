version: "3"
services:
  web:
    depends_on:
      - app
    build:
      context: ./docker/nginx
    ports:
      - 8080:80
    volumes:
      - type: volume
        source: wp_data
        target: /usr/share/nginx/html
      - type: bind
        source: ./docker/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
  app:
    depends_on:
      - db
    build:
      context: ./docker/php
    volumes:
      - type: volume
        source: wp_data
        target: /var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: wordpress
  db:
    image: mysql:5.7
    ports:
      - 3306:3306
    volumes:
      - type: volume
        source: db_data
        target: /var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
  cli:
    image: wordpress:cli-php7.4
    depends_on:
      - app
      - db
    volumes:
      - type: volume
        source: wp_data
        target: /var/www/html
      - type: bind
        source: ./docker/wp-cli/wp-setup.sh
        target: /usr/local/bin/wp-setup.sh
    environment:
      WORDPRESS_URL: localhost:8080
      WORDPRESS_TITLE: TanaveLab
      WORDPRESS_ADMIN_USER_MAIL_ADDRESS: tanavel1118@gmail.com
      WORDPRESS_ADMIN_USER_NAME: admin
      WORDPRESS_ADMIN_USER_PASSWORD: password
      WORDPRESS_TZ: Asia/Tokyo
      WORDPRESS_LANGUAGE: ja
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: wordpress
    command: wp-setup.sh
volumes:
  wp_data: {}
  db_data: {}
