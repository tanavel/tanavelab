version: "3"
services:
  web:
    depends_on:
      - app
    build:
      dockerfile: ./docker/nginx/Dockerfile
      context: .
    ports:
      - 8080:80
    volumes:
      - type: bind
        source: ./docker/nginx/conf.d/default.conf
        target: /etc/nginx/conf.d/default.conf
      - type: bind
        source: ./docker/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./src/web
        target: /var/www/tanavelab/web
  app:
    depends_on:
      - composer
      - db
    build:
      dockerfile: ./docker/php/Dockerfile
      context: .
    working_dir: /var/www/tanavelab
    volumes:
      - type: bind
        source: ./src
        target: /var/www/tanavelab

  db:
    image: mysql:5.7
    ports:
      - 3306:3306
    volumes:
      - type: volume
        source: db_data
        target: /var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: tanavelab
      MYSQL_USER: tanavelab
      MYSQL_PASSWORD: tanavelab
      MYSQL_DATABASE: tanavelab

  cli:
    depends_on:
      - app
      - db
    build:
      dockerfile: ./docker/php/Dockerfile
      context: .
    working_dir: /var/www/tanavelab
    volumes:
      - type: bind
        source: ./src
        target: /var/www/tanavelab
      - type: bind
        source: ./docker/php/wp-install.sh
        target: /usr/local/bin/wp-install.sh
    environment:
      WP_URL: localhost:8080
      WP_TITLE: TanaveLab
      WP_ADMIN_USER_MAIL_ADDRESS: test@example.com
      WP_ADMIN_USER_NAME: admin
      WP_ADMIN_USER_PASSWORD: password
      DB_HOST: db
    command: wp-install.sh

  composer:
    image: composer:2
    volumes:
      - type: bind
        source: ./src
        target: /app
    command: ["install"]

volumes:
  db_data: {}
